<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>notes</title>
<style>
@import 'https://cdn.jsdelivr.net/gh/dreampulse/computer-modern-web-font@master/fonts.css';

:root {
  --font-family-primary: "Computer Modern Serif", Georgia, serif;
  --font-family-secondary: "Computer Modern Sans", sans-serif;
  --font-family-tertiary: "Computer Modern Sans", sans-serif;
  --font-family-monospace: "Computer Modern Typewriter", 'Menlo', monospace;
  --font-weight-normal: 400;
  --font-weight-bold: 700;
  --font-size-base: 12pt;
  --line-height-primary: 1.2;
  --line-height-secondary: 1.0;
  --line-height-heading: 1.0;
  --line-height-monospace: 1.0;
  /* Shorthands */
  --font-primary: var(--font-weight-normal) var(--font-size-base)/var(--line-height-primary) var(--font-family-primary);
  --font-secondary: var(--font-weight-normal) var(--font-size-base)/var(--line-height-secondary) var(--font-family-secondary);
  --font-heading: var(--font-weight-bold) var(--font-size-base)/var(--line-height-heading) var(--font-family-secondary);
  --font-monospace: var(--font-weight-normal) calc(var(--font-size-base) * 0.9)/var(--line-height-monospace) var(--font-family-monospace);

  --RED: #DB4437; --BLUE: #0000cc; --YELLOW: #F4B400; --GREEN: #0F9D58;
  --BLACK:  #000; --WHITE:   #fff;   --GRAY:    #AAA;  --GREY:    #EEE;
  --site-max-wdth: 21rem;
}

html { font-size: var(--font-size-base); }

body {
  font: var(--font-primary);
  max-width: var(--site-max-wdth);
  margin: 0 auto ;
  padding: 0;
  text-align: justify;
  hyphens: auto;
  color: var(--BLACK);
}

h1, h2, h3, h4, .section-label { font: var(--font-heading); }

.cfg-toggle, .cfg-row label, .btn, .status, .ts-now, .hint, .pending-count, .section-label {
  font: var(--font-monospace);
  color: var(--GRAY);
}

.cfg-row {
  display: flex;
  flex-direction: row;
  justify-content: space-between;align-items: center;
}
.cfg-body {
  display: flex;
  flex-direction: column;
  gap: 0.5rem 0;
  padding:0;
}
.cfg-actions {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  gap: 0 0.5rem;
}
.cfg-hint, .empty{
  font: var(--font-monospace);
  text-align: center;
  font-style: italic;
}

textarea, input, code, pre { font: var(--font-monospace); }

textarea {
  width: 20rem;
  border: 0.5px dashed #000000;
  padding: 0;
  color: var(--BLACK);
  outline: none;
  border-radius: 3px;
}

.commit-row {
  display: flex;
  flex-direction: row;
  gap: 0.5rem 0;
  justify-content: flex-end;
}
.commit-row input, .cfg-row input {
  border: 1px solid var(--GRAY);
  padding: 4px 8px;
}
.wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 1rem 0;
  padding: 0 0.5rem;
}
.section {
  display: flex;
  flex-direction: column;
  gap: 0.5rem 0; width: 100%;
}
.entry { display: flex; gap: 0rem;}
.entry-body {
  font: var(--font-primary);
  width: 100%;
  padding: 0;
  border: 0px solid var(--GRAY);
  & h2 {
    color: var(--GRAY);
    font-size: 0.8rem;
    font-weight: normal;
    margin: 1rem 0 0 0;
  }
  & :is(p, ul,ol) {
    margin: 0.5rem 0 0 0;
  }
  & :is(ul, ol) {
    padding-left: 3ch;
  }
}
.btn {
  border: 1px solid var(--GRAY);
  cursor: pointer;
  background: none;
  text-align: center;
  color: var(--BLACK);
}
.btn:hover { border-color: var(--GRAY); color: var(--BLACK); }
.status.ok { color: var(--GREEN); }
.status.err { color: var(--RED); }
.entry-del {
  width: 1rem;
  height: 1.2rem;
  border: 1px solid var(--GRAY);
  text-align: center;
  background-color: var(--WHITE);
  cursor: pointer;
}
.compose {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0.5rem 0;
}
.compose-meta {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
}
</style>
</style>
</head>
<body>
<div id="app">
  <div class="wrap">
    <div class="section">
      ndrwx
    </div>
    <div class="section">
      <button class="cfg-toggle" @click="showCfg = !showCfg">⚙ config{{ showCfg ? ' ▲' : '' }}</button>
    </div>
    <div class="section" v-if="showCfg">
      <div class="cfg-body" >
        <div class="cfg-row"><label>token</label><input type="password" v-model="cfg.token" placeholder="ghp_xxxxxxxxxxxx" @input="saveCfg" /></div>
        <div class="cfg-row"><label>repo</label><input type="text" v-model="cfg.repo" placeholder="username/repo" @input="saveCfg" /></div>
        <div class="cfg-row"><label>file</label><input type="text" v-model="cfg.file" placeholder="notes.md" @input="saveCfg" /></div>
        <div class="cfg-row"><label>branch</label><input type="text" v-model="cfg.branch" placeholder="main" @input="saveCfg" /></div>
        <div class="cfg-actions">
          <button class="btn primary" @click="pullRemote">↓ pull from repo</button>
          <button class="btn" @click="exportMd">export .md</button>
          <button class="btn" style="color:#c44;border-color:#e5c0c0" @click="clearLocal">clear local</button>
        </div>
        <div class="cfg-hint">
          <a href="https://github.com/settings/tokens/new" target="_blank">Create</a> a PAT with repo scope.
        </div>
      </div>
    </div>

    <div class="status" :class="statusCls">{{ statusMsg }}</div>
    <div class="section">
      <div class="compose">
        <div class="compose-meta">
          <span class="ts-now">{{ clock }}</span>
        </div>
        <textarea
          v-model="draft"
          placeholder="↵ newline | shift+↵ save"
          rows="5"
          ref="ta"
          @keydown.shift.enter.prevent="addNote"
          @input="autoResize"
        ></textarea>
      </div>
    </div>

    <div class="section">
      <div v-if="!localNotes.length" class="empty">nothing yet</div>
      <div class="entry" v-for="n in localNotes" :key="n.id">
        <div class="entry-body" v-html="renderMd(n.raw)"></div>
        <div class="entry-del" @click="deleteLocal(n.id)">×</div>
      </div>
    </div>

    <div class="section">
      <div class="commit-row" v-if="localNotes.length">
        <button class="btn primary" :disabled="!repoReady || syncing" @click="commitNow">commit</button>
      </div>
    </div>

    <div class="section">
      <div v-if="!remoteRaw" class="empty">not loaded</div>
      <div v-else class="entry">
        <div class="entry-body" v-html="renderMd(remoteRaw)"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const { createApp, ref, computed, onMounted, nextTick } = Vue;

createApp({
  setup() {
    const showCfg    = ref(false);
    const draft      = ref('');
    const commitMsg  = ref('');
    const localNotes = ref([]);
    const remoteRaw  = ref('');
    const syncing    = ref(false);
    const statusMsg  = ref('');
    const statusCls  = ref('');
    const clock      = ref('');
    const ta         = ref(null);

    const cfg = ref({ token:'', repo:'', file:'notes.md', branch:'main' });

    marked.setOptions({
      breaks: true,
      gfm: true,
      headerIds: false,
      mangle: false
    });

    function renderMd(text) {
      if (!text) return '';
      return marked.parse(text);
    }

    const repoReady = computed(() => !!(cfg.value.token && cfg.value.repo));

    const defaultCommitMsg = computed(() => {
      const n = localNotes.value.length;
      const ts = getNowFormatted();
      return `add ${n} entr${n!==1?'ies':'y'} [${ts}]`;
    });

    function getNowFormatted() {
      const d = new Date();
      const date = d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      const time = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      return `${date} ${time}`;
    }

    function tickClock() {
      clock.value = getNowFormatted();
    }

    let statusTimer = null;
    function setStatus(msg, cls='', autoClear=false) {
      clearTimeout(statusTimer);
      statusMsg.value = msg;
      statusCls.value = cls;
      if (autoClear) statusTimer = setTimeout(() => { statusMsg.value = ''; statusCls.value = ''; }, 3000);
    }

    function saveCfg() { localStorage.setItem('ncfg', JSON.stringify(cfg.value)); }
    function loadCfg() {
      try { const r = localStorage.getItem('ncfg'); if (r) cfg.value = {...cfg.value, ...JSON.parse(r)}; } catch(e){}
    }

    function saveLocal() { localStorage.setItem('notes_local', JSON.stringify(localNotes.value)); }
    function loadLocal() {
      try { const r = localStorage.getItem('notes_local'); if (r) localNotes.value = JSON.parse(r); } catch(e){}
    }

    function addNote() {
      const body = draft.value.trim(); if (!body) return;
      const ts = getNowFormatted();

      localNotes.value.unshift({ id: uid(), raw: `## ${ts}\n${body}` });

      saveLocal();
      draft.value = '';
      nextTick(() => { if (ta.value) { ta.value.style.height = 'auto'; ta.value.focus(); } });
    }

    function deleteLocal(id) {
      localNotes.value = localNotes.value.filter(n => n.id !== id);
      saveLocal();
    }

    function clearLocal() {
      if (!confirm('Delete all local notes?')) return;
      localNotes.value = []; saveLocal(); setStatus('local notes cleared', '', true);
    }

    function autoResize() {
      if (!ta.value) return;
      ta.value.style.height = 'auto';
      ta.value.style.height = Math.min(ta.value.scrollHeight, 220) + 'px';
    }

    async function ghFetch(method, path, body) {
      const res = await fetch('https://api.github.com' + path, {
        method,
        headers: {
          'Authorization': 'token ' + cfg.value.token,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json',
        },
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || res.statusText);
      return data;
    }

    async function getFileMeta() {
      try {
        const { repo, file, branch } = cfg.value;
        const d = await ghFetch('GET', `/repos/${repo}/contents/${file}?ref=${branch}`);
        return { sha: d.sha, content: decodeURIComponent(escape(atob(d.content.replace(/\n/g,'')))) };
      } catch(e) {
        if (/404|Not Found/i.test(e.message)) return null;
        throw e;
      }
    }

    async function pullRemote() {
      if (!repoReady.value) { setStatus('configure repo first', 'err'); return; }
      setStatus('pulling...');
      try {
        const file = await getFileMeta();
        if (!file) { remoteRaw.value = ''; setStatus('file not in repo yet', '', true); return; }
        remoteRaw.value = file.content;
        setStatus('pulled from repo', 'ok', true);
      } catch(e) { setStatus('pull failed: ' + e.message, 'err'); }
    }

    async function commitNow() {
      if (!repoReady.value) { setStatus('configure repo first', 'err'); showCfg.value = true; return; }
      if (!localNotes.value.length) return;
      syncing.value = true;
      setStatus('committing...');
      try {
        const message = commitMsg.value.trim() || defaultCommitMsg.value;
        const file = await getFileMeta();
        const currentContent = file ? file.content : '';
        const localMd = localNotes.value.map(n => n.raw).join('\n\n') + '\n\n';
        const finalContent = localMd + currentContent;
        const content = btoa(unescape(encodeURIComponent(finalContent)));
        await ghFetch('PUT', `/repos/${cfg.value.repo}/contents/${cfg.value.file}`, {
          message, content, branch: cfg.value.branch,
          ...(file ? { sha: file.sha } : {}),
        });
        remoteRaw.value = finalContent;
        localNotes.value  = [];
        saveLocal();
        commitMsg.value = '';
        setStatus(`committed: "${message.slice(0,60)}"`, 'ok', true);
      } catch(e) { setStatus('commit failed: ' + e.message, 'err'); }
      syncing.value = false;
    }

    function exportMd() {
      const localMd = localNotes.value.map(n => n.raw).join('\n\n') + (localNotes.value.length ? '\n\n' : '');
      const full = localMd + remoteRaw.value;
      const blob = new Blob([full], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'notes-' + new Date().toISOString().slice(0,10) + '.md';
      a.click();
    }

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

    onMounted(() => {
      loadCfg();
      loadLocal();
      tickClock();
      setInterval(tickClock, 10000);
      if (repoReady.value) setTimeout(pullRemote, 500);
      nextTick(() => ta.value?.focus());
    });

    return {
      showCfg, draft, commitMsg, localNotes, remoteRaw, syncing,
      statusMsg, statusCls, clock, ta, cfg,
      repoReady, defaultCommitMsg,
      saveCfg, addNote, deleteLocal, clearLocal, autoResize,
      pullRemote, commitNow, exportMd, renderMd
    };
  }
}).mount('#app');
</script>
</body>
</html>
