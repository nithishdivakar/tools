<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font: 13px/1.2 monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 680px;
      padding: 0.75rem 1rem;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
      font-size: 11px;
    }
    .actions { display: flex; gap: 10px; color: #aaa; }
    .actions span { cursor: pointer; }
    .actions span:hover { color: #000; }
    #status { color: #aaa; margin-left: 5px; }
    #ot-editor { flex: 1; border-top: 1px solid #e8e8e8; }

    /* ── overlay setup ── */
    #overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.97);
      display: flex; flex-direction: column; gap: 0.8em;
      padding: 2rem; max-width: 680px; z-index: 100;
    }
    #overlay label { font-size: 0.8em; color: #888; display: block; margin-bottom: 2px; }
    #overlay input {
      font-family: inherit; font-size: 13px; border: none; 
      border-bottom: 1px solid #ccc; outline: none; width: 100%; 
      background: transparent; padding: 2px 0;
    }
    #overlay .err { font-size: 11px; color: #c00; }
    #overlay button {
      font-family: inherit; font-size: 11px; background: none; border: none;
      color: #aaa; cursor: pointer; align-self: flex-start; padding: 0;
    }
    #overlay button:hover { color: #000; }
  </style>
</head>
<body>

  <div id="overlay" style="display:none">
    <div>
      <label>token</label>
      <input id="inp-pat" type="password" autocorrect="off" autocapitalize="off" />
    </div>
    <div>
      <label>repo (owner/repo)</label>
      <input id="inp-repo" placeholder="owner/repo" autocorrect="off" autocapitalize="off" />
    </div>
    <div>
      <label>file path</label>
      <input id="inp-file" placeholder="notes.md" autocorrect="off" autocapitalize="off" />
    </div>
    <div id="setup-err" class="err"></div>
    <button id="setup-btn">[connect]</button>
  </div>

  <div class="top-bar">
    <div class="actions">
      <span id="btn-sync" style="display:none">↑ sync</span>
      <span id="btn-pull" style="display:none">↓ pull</span>
      <span id="btn-config">⚙ config</span>
      <span id="status"></span>
    </div>
  </div>

  <div id="ot-editor"></div>

<script src="https://cdn.jsdelivr.net/npm/overtype@latest/dist/overtype.min.js"></script>
<script>
const GH_KEY = 'list_gh_v1'
let sha = null
let otEditor = null

// Elements
const overlay = document.getElementById('overlay')
const inpPat = document.getElementById('inp-pat')
const inpRepo = document.getElementById('inp-repo')
const inpFile = document.getElementById('inp-file')
const setupErr = document.getElementById('setup-err')
const setupBtn = document.getElementById('setup-btn')

const btnSync = document.getElementById('btn-sync')
const btnPull = document.getElementById('btn-pull')
const btnConfig = document.getElementById('btn-config')
const statusEl = document.getElementById('status')

function setStatus(msg, isErr = false) {
  statusEl.textContent = msg
  statusEl.style.color = isErr ? '#c00' : '#aaa'
}

function getCreds() {
  try { return JSON.parse(localStorage.getItem(GH_KEY)) } catch { return null }
}

function updateUiVisibility() {
  const hasCreds = !!getCreds()
  btnSync.style.display = hasCreds ? 'inline' : 'none'
  btnPull.style.display = hasCreds ? 'inline' : 'none'
}

function showOverlay() {
  const c = getCreds()
  if (c) {
    inpPat.value = c.pat
    inpRepo.value = c.repo
    inpFile.value = c.file
  }
  setupErr.textContent = ''
  overlay.style.display = 'flex'
}

function ghHeaders(pat) {
  return { 'Authorization': `Bearer ${pat}`, 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28', 'Content-Type': 'application/json' }
}

async function loadFromGithub() {
  const c = getCreds()
  if (!c) return
  setStatus('loading…')
  try {
    const r = await fetch(`https://api.github.com/repos/${c.repo}/contents/${c.file}`, { headers: ghHeaders(c.pat) })
    if (!r.ok) throw new Error(`GitHub ${r.status}`)
    const j = await r.json()
    sha = j.sha
    otEditor.setValue(atob(j.content.replace(/\n/g, '')))
    setStatus('loaded ✓')
  } catch (e) {
    setStatus(e.message, true)
  }
}

async function syncUp() {
  const c = getCreds()
  if (!c) return
  setStatus('syncing…')
  try {
    const r = await fetch(`https://api.github.com/repos/${c.repo}/contents/${c.file}`, {
      method: 'PUT',
      headers: ghHeaders(c.pat),
      body: JSON.stringify({ message: 'md: sync', content: btoa(unescape(encodeURIComponent(otEditor.getValue()))), sha })
    })
    if (!r.ok) throw new Error(`GitHub ${r.status}`)
    const j = await r.json()
    sha = j.content.sha
    setStatus('synced ✓')
  } catch (e) {
    setStatus(e.message, true)
  }
}

// Setup Config Submit
setupBtn.addEventListener('click', async () => {
  const pat = inpPat.value.trim()
  const repo = inpRepo.value.trim()
  const file = inpFile.value.trim()

  if (!pat || !repo || !file) { setupErr.textContent = 'all fields required'; return }
  setupBtn.textContent = '[connecting…]'; setupErr.textContent = ''

  try {
    // Validate credentials instantly by pulling metadata
    const r = await fetch(`https://api.github.com/repos/${repo}/contents/${file}`, { headers: ghHeaders(pat) })
    if (!r.ok) throw new Error(`GitHub ${r.status}`)
    const j = await r.json()
    
    // Save credentials & context
    localStorage.setItem(GH_KEY, JSON.stringify({ pat, repo, file }))
    sha = j.sha
    otEditor.setValue(atob(j.content.replace(/\n/g, '')))
    
    overlay.style.display = 'none'
    updateUiVisibility()
    setStatus('loaded ✓')
  } catch (e) {
    setupErr.textContent = e.message
  } finally {
    setupBtn.textContent = '[connect]'
  }
})

// Init Editor
const [ot] = new OverType('#ot-editor', {
  placeholder: 'start writing…',
  value: '',
  theme: 'solar',
  fontFamily: "monospace",
  fontSize: '13px',
  lineHeight: 1.2,
  autoResize: false,
  toolbar: false,
  spellcheck: false,
})
otEditor = ot

// Listeners
btnConfig.addEventListener('click', showOverlay)
btnSync.addEventListener('click', syncUp)
btnPull.addEventListener('click', () => { if (confirm('Discard local changes and pull?')) loadFromGithub() })

// Startup
updateUiVisibility()
if (getCreds()) {
  loadFromGithub()
} else {
  showOverlay()
}
</script>
</body>
</html>
