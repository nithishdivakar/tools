<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>READ min</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="feed-config.js"></script>
    <script src="cache-db.js"></script>
    <script src="rss-engine.js"></script>
    <style>
        * { margin: 0; }
        body {font-size:16px; word-wrap: break-word; margin: 0.5rem;}
        .rows {display: flex; flex-direction: column;}
        .cols {display: flex; flex-direction: row;}
        .gapx {gap:0 0.5rem;}
        .gapy {gap:0.5rem 0;}
        .snippet {color: #01335b;font-size: small;}
    </style>
</head>
<body>
<div id="app" class="rows" style="gap: 1rem 0;">
    <h1>READ</h1>
    <div>{{ status }} -- {{b0_out.length}} injested</div>
    <div class="rows gapy">
        <h2>Predicates</h3>
        <ul>
            <li>
                <div class="cols" style="justify-content: flex-start;flex-wrap: wrap; gap: 0 0.5rem;">
                    <span>Tags:</span>
                    <a href="#" @click="set_active_tag(null)">all</a>
                    <template v-for="tag in all_tags">
                        <a href="#" @click="set_active_tag(tag)">{{ tag }}</a>
                    </template>
                </div>
            </li>
            <li>
                <div class="cols" style="justify-content: flex-start;flex-wrap: wrap; gap: 0 0.5rem;">
                    <span>Days:</span>
                    <a href="#" @click="set_date_preset(1)">1d</a>
                    <a href="#" @click="set_date_preset(3)">3d</a>
                    <a href="#" @click="set_date_preset(7)">7d</a>
                    <a href="#" @click="set_date_preset(128)">all</a>
                </div>
            </li>
        </ul>
    </div>

    <div class="rows gapy">
        <h2> Filtered Buffer : {{b2_out.length}}</h2>
        <div>
           <blockquote>
                Visible tags: {{ visible_tags.join(', ') }}
            </blockquote>
        </div>
        <div class="rows" style="gap:1em 0;">
            <div v-for="a in b2_out" :key="a.link">
                <art :a="a"></art>
            </div>
        </div>
    </div>
</div>
<script>
const { createApp, ref, computed, reactive, onMounted } = Vue;

function make_buffer(source = null) {
    const _store     = source ? null : ref([]);
    const predicates = ref({});

    const all = source ? source : _store;  // source is already a computed ref

    const out = computed(() =>
        all.value.filter(a => Object.values(predicates.value).every(p => p(a)))
    );

    function ingest(article)   { if (_store) _store.value.push(article); }
    function set_p(key, fn)    { predicates.value = { ...predicates.value, [key]: fn }; }
    function remove_p(key)     { const { [key]: _, ...rest } = predicates.value; predicates.value = rest; }

    return { out, ingest, set_p, remove_p };
}

const app = createApp({
    setup() {
        const status = ref('loading...');

        const b0 = make_buffer();
        const b1 = make_buffer(b0.out);
        const b2 = make_buffer(b1.out);

        const get_unique_tags = (buffer) => computed(() => {
            const raw = buffer.out.value.flatMap(item => item.source?.tags || []);
            return [...new Set(raw.filter(t => t != null))].sort();
        });

        const set_date_preset = (b, days) => {
                const start = new Date();
                start.setDate(start.getDate() - parseInt(days));
                const start_str = start.toISOString().split('T')[0];
                b.set_p('date_start', a => a.date.toISOString().split('T')[0] >= start_str);
        };

        const set_active_tag = (b, tag) => {
            if (tag === null) {
                b.set_p('tag_filter', () => true);
            } else {
                b.set_p('tag_filter', a => 
                    Array.isArray(a.source?.tags) && a.source.tags.includes(tag)
                );
            }
        };

        async function fetch_source(config) {
            try {
                let bundle = await CacheDB.get(config.url);
                if (!bundle) {
                    bundle = await RSSEngine.process({ url: config.url, name: config.name });
                    if (bundle.status === 'success') await CacheDB.set(config.url, bundle);
                }
                if (bundle.status === 'success') {
                    bundle.items.forEach(item => b0.ingest({
                        ...item,
                        date:        new Date(item.date || Date.now()),
                        source_name: config.name || config.url,
                        source_id:   config.url,
                        source: config,
                        from_cache:  bundle.fromCache,
                    }));
                }
            } catch (e) {
                console.error('fetch error', config.url, e);
            }
        }

        onMounted(async () => {
            await CacheDB.cleanup();
            status.value = `fetching ${FEED_CONFIG.length} sources`;
            set_date_preset(b1, 30);
            set_date_preset(b2, 1);
            await Promise.allSettled(FEED_CONFIG.map(fetch_source));
            status.value = `done — ${b0.out.value.length} total, ${b2.out.value.length} filtered`;
        });

        const all_tags = get_unique_tags(b1);
        const visible_tags = get_unique_tags(b2); 
        const today = new Date().toISOString().split('T')[0];

        return { 
            status, 
            b0_out: b0.out, 
            // b1_out: b1.out, 
            b2_out: b2.out,
            b2,
            set_date_preset: (days) => set_date_preset(b2, days),
            set_active_tag: (tag) => set_active_tag(b2, tag),
            all_tags,
            visible_tags
        };
    }
});

app.component('art', {
    props: ['a'],
    template: `
        <div class="rows">
            <small> {{a.sourceName}} | {{ a.date.toLocaleDateString('en-GB', {year: 'numeric', month: 'long', day: 'numeric' }) }} | {{ a.source.tags ? a.source.tags.join(', ') : 'none' }}</small> 
            <big><a :href="a.link" target="_blank">{{ a.title }}</a> </big>
            <div class="snippet">
                {{ a.snippet.substring(0, 600) }}
            </div>
        </div>
    `
});


app.mount('#app');
</script>
</body>
</html>
