<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>READ min</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="feed-config.js"></script>
    <script src="cache-db.js"></script>
    <script src="rss-engine.js"></script>
    <style>
        * { margin: 0; }
        body {font-size:16px; word-wrap: break-word; margin: 0.5rem;}
        .rows {display: flex; flex-direction: column;}
        .cols {display: flex; flex-direction: row;}
        .gapx {gap:0 0.5rem;}
        .gapy {gap:0.5rem 0;}
        .snippet {color: #01335b;font-size: small;}
        .meta {color: #01335b;font-size: x-small;}
        .seen { opacity: 0.5; }
    </style>
</head>
<body>
<div id="app" class="rows" style="gap: 1rem 0;">
    <h1>READ</h1>
    <div>{{ status }} -- {{b0_out.length}} injested</div>
    <div class="rows gapy">
        <h2>Predicates</h3>
        <ul>
            <li>
                <div class="cols" style="justify-content: flex-start;flex-wrap: wrap; gap: 0 0.5rem;">
                    <span>Tags:</span>
                    <a href="#" @click="set_active_tag(null)">all</a>
                    <template v-for="tag in all_tags">
                        <a href="#" @click="set_active_tag(tag)">{{ tag }}</a>
                    </template>
                </div>
            </li>
            <li>
                <div class="cols" style="justify-content: flex-start;flex-wrap: wrap; gap: 0 0.5rem;">
                    <span>Days:</span>
                    <a href="#" @click="set_date_preset(1)">1d</a>
                    <a href="#" @click="set_date_preset(3)">3d</a>
                    <a href="#" @click="set_date_preset(7)">7d</a>
                    <a href="#" @click="set_date_preset(128)">all</a>
                </div>
            </li>
        </ul>
    </div>

    <div class="rows gapy">
        <h2> Filtered Buffer : {{b2_out.length}}</h2>
        <div>
           <blockquote>
                Visible tags: {{ visible_tags.join(', ') }}
            </blockquote>
        </div>
        <div class="rows" style="gap:1em 0;">
            <div v-for="(a, i) in b2_out" :key="a.link + i">
                <art :a="a"></art>
            </div>
        </div>
    </div>
</div>
<script>
const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

const SeenStore = (() => {
    const KEY     = 'reader_seen_v2';
    const TTL_MS  = 7 * 24 * 60 * 60 * 1000;
    let map = {};

    try {
        const stored = JSON.parse(localStorage.getItem(KEY) || '{}');
        const now    = Date.now();
        for (const [url, ts] of Object.entries(stored))
            if (now - ts < TTL_MS) map[url] = ts;
        localStorage.setItem(KEY, JSON.stringify(map));
    } catch {}

    return {
        has(url) { return url in map; },
        add(url) { map[url] = Date.now(); try { localStorage.setItem(KEY, JSON.stringify(map)); } catch {} },
    };
})();

const seen_observer = new IntersectionObserver((entries) => {
    for (const e of entries) {
        if (e.intersectionRatio < 0.5) continue;
        const article = e.target._article;
        if (!article || article.source.tags.includes('seen')) continue;
        e.target._timer = setTimeout(() => {
            // article.source.tags.push('seen');
            SeenStore.add(article.link);
        }, 1000);
    }
}, { threshold: 0.5 });

function make_buffer(source = null, sort_fn = null) {
    const _store     = source ? null : ref([]);
    const predicates = ref({});
    const all        = source ? source : _store;

    const out = computed(() => {
        const filtered = all.value.filter(
            a => Object.values(predicates.value).every(p => p(a))
        );
        return sort_fn ? [...filtered].sort(sort_fn) : filtered;
    });

    function ingest(article)           { if (_store) _store.value.push(article); }
    function set_predicate(key, fn)    { predicates.value = { ...predicates.value, [key]: fn }; }
    function remove_predicate(key)     { const { [key]: _, ...rest } = predicates.value; predicates.value = rest; }

    return { out, ingest, set_predicate, remove_predicate };
}

const app = createApp({
    setup() {
        const status = ref('loading...');

        const b0 = make_buffer();
        const b1 = make_buffer(b0.out);
        const b2 = make_buffer(b1.out, (a, b) => a._salt - b._salt);

        const get_unique_tags = (buffer) => computed(() => {
            const raw = buffer.out.value.flatMap(item => item.source?.tags || []);
            return [...new Set(raw.filter(t => t != null))].sort();
        });

        const set_date_preset = (b, days) => {
            const start = new Date();
            start.setDate(start.getDate() - parseInt(days));
            const start_str = start.toISOString().split('T')[0];
            b.set_predicate('date_start', a => a.date.toISOString().split('T')[0] >= start_str);
        };

        const set_active_tag_g = (b, tag) => {
            if (tag === null) {
                b.set_predicate('tag_filter', () => true);
            } else {
                b.set_predicate('tag_filter', a =>
                    Array.isArray(a.source?.tags) && a.source.tags.includes(tag)
                );
            }
        };

        async function fetch_source(config) {
            try {
                let bundle = await CacheDB.get(config.url);
                if (!bundle) {
                    bundle = await RSSEngine.process({ url: config.url, name: config.name });
                    if (bundle.status === 'success') await CacheDB.set(config.url, bundle);
                }
                if (bundle.status === 'success') {
                    bundle.items.forEach(item => {
                        const orig_tags = [...(config.tags || [])];
                        if (SeenStore.has(item.link)){
                            orig_tags.push('seen');
                        }
                        const tags = [...new Set([...orig_tags])];

                        b0.ingest({
                            ...item,
                            _salt:       Math.random(),
                            date:        new Date(item.date || Date.now()),
                            source_name: config.name || config.url,
                            source_id:   config.url,
                            source:      { ...config, tags },
                            from_cache:  bundle.fromCache,
                        });
                    });
                }
            } catch (e) {
                console.error('fetch error', config.url, e);
            }
        }

        onMounted(async () => {
            await CacheDB.cleanup();
            status.value = `fetching ${FEED_CONFIG.length} sources`;
            set_date_preset(b1, 30);
            set_date_preset(b2, 1);
            await Promise.allSettled(FEED_CONFIG.map(fetch_source));
            status.value = `done — ${b0.out.value.length} total, ${b2.out.value.length} filtered`;
        });

        const all_tags     = get_unique_tags(b1);
        const visible_tags = get_unique_tags(b2);

        return {
            status,
            b0_out: b0.out,
            b2_out: b2.out,
            b2,
            set_date_preset: (days) => set_date_preset(b2, days),
            set_active_tag:  (tag)  => set_active_tag_g(b2, tag),
            all_tags,
            visible_tags,
        };
    }
});

app.component('art', {
    props: ['a'],
    setup(props) {
        const root = ref(null);
        onMounted(() => {
            root.value._article = props.a;
            seen_observer.observe(root.value);
        });
        onUnmounted(() => {
    if (root.value) {
        clearTimeout(root.value._timer);
        seen_observer.unobserve(root.value);
    }
});
        return { root };
    },
    template: `
        <div :class="['rows', { seen: a.source.tags?.includes('seen') }]" ref="root">
            <span class="meta">
                {{a.sourceName}} | {{ a.date.toLocaleDateString('en-GB', {year: 'numeric', month: 'long', day: 'numeric' }) }} | {{ a.source.tags ? a.source.tags.join(', ') : 'none' }}
            </span>
            <span style="font-size: larger;">
                <a :href="a.link" target="_blank">{{ a.title }}</a>
            </span>
            <div class="snippet">
                {{ a.snippet.substring(0, 600) }}
            </div>
        </div>
    `
});

app.mount('#app');
</script>
</body>
</html>
